# Azure DevOps parity pipeline (reference only).
#
# This mirrors the GitHub Actions Quality workflow (.github/workflows/quality.yml)
# using Azure DevOps task syntax, so the same gates can run on either platform.
# It is provided as a reference artifact and is not wired to any project.
#
# Gates: Bicep build + lint, PSRule for Azure static analysis, markdownlint.
# No Azure authentication is required; all analysis is static.

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: AzureCLI@2
    displayName: Bicep build and lint
    inputs:
      azureSubscription: '$(serviceConnection)' # reference only; not used for static checks
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail
        az bicep install
        fail=0
        while IFS= read -r f; do
          echo "Building $f"
          az bicep build --file "$f" --stdout > /dev/null || fail=1
        done < <(find modules -name 'main.bicep')
        while IFS= read -r f; do
          echo "Building params $f"
          az bicep build-params --file "$f" --stdout > /dev/null || fail=1
        done < <(find modules -name '*.bicepparam')
        exit $fail

  - task: PowerShell@2
    displayName: PSRule for Azure (static analysis)
    inputs:
      pwsh: true
      targetType: inline
      script: |
        Install-Module -Name PSRule.Rules.Azure -Repository PSGallery -Scope CurrentUser -Force
        # Bicep CLI for source expansion (no Azure authentication required).
        curl -sLo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
        chmod +x bicep
        sudo mv bicep /usr/local/bin/bicep
        Assert-PSRule -InputPath './modules/' -Module 'PSRule.Rules.Azure' -Option './ps-rule.yaml' -Format File

  - task: Npm@1
    displayName: Markdown lint
    inputs:
      command: custom
      customCommand: 'exec -- markdownlint-cli2 "**/*.md"'
